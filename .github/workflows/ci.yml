name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # canvas isn't compatible with node 24 yet
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm test
